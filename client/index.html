<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>谜境推理 - 剧本杀桌游店</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
      background: #0f0f1a;
      color: #e0e0e0;
      min-height: 100vh;
    }

    #root { min-height: 100vh; display: flex; flex-direction: column; }

    /* ========== Header ========== */
    .header {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      padding: 0 2rem;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(10px);
    }

    .header-logo {
      font-size: 1.4rem;
      font-weight: 700;
      background: linear-gradient(135deg, #e94560, #c23616);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: 2px;
    }

    .header-nav { display: flex; gap: 0.5rem; align-items: center; }

    .nav-link {
      padding: 0.5rem 1rem;
      color: #a0a0b8;
      text-decoration: none;
      border-radius: 8px;
      font-size: 0.9rem;
      transition: all 0.2s;
      cursor: pointer;
      border: none;
      background: none;
    }

    .nav-link:hover, .nav-link.active {
      color: #fff;
      background: rgba(233, 69, 96, 0.15);
    }

    .nav-link.active {
      color: #e94560;
    }

    .btn {
      padding: 0.5rem 1.2rem;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.2s;
      font-weight: 500;
    }

    .btn-primary {
      background: linear-gradient(135deg, #e94560, #c23616);
      color: #fff;
    }

    .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }

    .btn-secondary {
      background: rgba(255,255,255,0.08);
      color: #e0e0e0;
      border: 1px solid rgba(255,255,255,0.1);
    }

    .btn-secondary:hover { background: rgba(255,255,255,0.15); }

    .btn-small { padding: 0.3rem 0.8rem; font-size: 0.8rem; }

    .btn-danger {
      background: rgba(220,53,69,0.2);
      color: #dc3545;
      border: 1px solid rgba(220,53,69,0.3);
    }

    .btn-danger:hover { background: rgba(220,53,69,0.3); }

    .btn-success {
      background: rgba(40,167,69,0.2);
      color: #28a745;
      border: 1px solid rgba(40,167,69,0.3);
    }

    .btn-success:hover { background: rgba(40,167,69,0.3); }

    /* ========== Main Content ========== */
    .main-content {
      flex: 1;
      max-width: 1200px;
      width: 100%;
      margin: 0 auto;
      padding: 2rem;
    }

    /* ========== Page Title ========== */
    .page-title {
      font-size: 1.8rem;
      font-weight: 700;
      margin-bottom: 1.5rem;
      background: linear-gradient(135deg, #fff, #a0a0b8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .page-subtitle {
      color: #808098;
      margin-bottom: 2rem;
      font-size: 0.95rem;
    }

    /* ========== Cards ========== */
    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.5rem;
    }

    .card {
      background: linear-gradient(135deg, #1a1a2e 0%, #1e1e36 100%);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 16px;
      padding: 1.5rem;
      transition: all 0.3s;
      cursor: pointer;
    }

    .card:hover {
      border-color: rgba(233,69,96,0.3);
      transform: translateY(-4px);
      box-shadow: 0 12px 40px rgba(0,0,0,0.3);
    }

    .card-title {
      font-size: 1.2rem;
      font-weight: 600;
      margin-bottom: 0.8rem;
      color: #fff;
    }

    .card-info {
      display: flex;
      flex-wrap: wrap;
      gap: 0.6rem;
      margin-bottom: 1rem;
    }

    .card-tag {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      padding: 0.25rem 0.7rem;
      border-radius: 20px;
      font-size: 0.8rem;
      background: rgba(255,255,255,0.06);
      color: #a0a0b8;
    }

    .tag-available {
      background: rgba(40,167,69,0.15);
      color: #28a745;
    }

    .tag-maintenance {
      background: rgba(255,193,7,0.15);
      color: #ffc107;
    }

    .tag-price {
      background: rgba(233,69,96,0.15);
      color: #e94560;
    }

    .tag-easy { background: rgba(40,167,69,0.15); color: #28a745; }
    .tag-medium { background: rgba(255,193,7,0.15); color: #ffc107; }
    .tag-hard { background: rgba(220,53,69,0.15); color: #dc3545; }

    .card-desc {
      color: #808098;
      font-size: 0.85rem;
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* ========== Stars ========== */
    .stars {
      display: inline-flex;
      gap: 2px;
      color: #ffc107;
      font-size: 0.9rem;
    }

    .stars .empty { color: #333; }

    .rating-score {
      color: #ffc107;
      font-weight: 600;
      margin-right: 0.3rem;
    }

    .rating-count {
      color: #808098;
      font-size: 0.8rem;
    }

    /* ========== Forms ========== */
    .form-container {
      max-width: 440px;
      margin: 4rem auto;
      background: linear-gradient(135deg, #1a1a2e, #1e1e36);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 20px;
      padding: 2.5rem;
    }

    .form-title {
      text-align: center;
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      color: #fff;
    }

    .form-subtitle {
      text-align: center;
      color: #808098;
      margin-bottom: 2rem;
      font-size: 0.9rem;
    }

    .form-group {
      margin-bottom: 1.2rem;
    }

    .form-label {
      display: block;
      margin-bottom: 0.4rem;
      color: #a0a0b8;
      font-size: 0.85rem;
      font-weight: 500;
    }

    .form-input, .form-select, .form-textarea {
      width: 100%;
      padding: 0.75rem 1rem;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      color: #e0e0e0;
      font-size: 0.95rem;
      transition: border-color 0.2s;
      outline: none;
    }

    .form-input:focus, .form-select:focus, .form-textarea:focus {
      border-color: #e94560;
    }

    .form-textarea { resize: vertical; min-height: 80px; font-family: inherit; }

    .form-select { cursor: pointer; }
    .form-select option { background: #1a1a2e; color: #e0e0e0; }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    .form-error {
      color: #dc3545;
      font-size: 0.85rem;
      margin-bottom: 1rem;
      text-align: center;
      padding: 0.5rem;
      background: rgba(220,53,69,0.1);
      border-radius: 8px;
    }

    .form-success {
      color: #28a745;
      font-size: 0.85rem;
      margin-bottom: 1rem;
      text-align: center;
      padding: 0.5rem;
      background: rgba(40,167,69,0.1);
      border-radius: 8px;
    }

    /* ========== Detail Page ========== */
    .detail-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 2rem;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .detail-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 0.8rem;
      margin: 1rem 0;
    }

    .detail-section {
      background: linear-gradient(135deg, #1a1a2e, #1e1e36);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 16px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }

    .detail-section h3 {
      font-size: 1.1rem;
      margin-bottom: 1rem;
      color: #fff;
    }

    /* ========== Table ========== */
    .data-table {
      width: 100%;
      border-collapse: collapse;
    }

    .data-table th, .data-table td {
      padding: 0.8rem 1rem;
      text-align: left;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .data-table th {
      color: #808098;
      font-weight: 500;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .data-table tr:hover td {
      background: rgba(255,255,255,0.02);
    }

    /* ========== Stats ========== */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .stat-card {
      background: linear-gradient(135deg, #1a1a2e, #1e1e36);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 16px;
      padding: 1.5rem;
      text-align: center;
    }

    .stat-value {
      font-size: 2rem;
      font-weight: 700;
      background: linear-gradient(135deg, #e94560, #c23616);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.3rem;
    }

    .stat-label {
      color: #808098;
      font-size: 0.85rem;
    }

    /* ========== Room Usage ========== */
    .usage-bar {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-top: 1rem;
    }

    .usage-item {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 1rem;
      border-radius: 10px;
      font-size: 0.85rem;
      background: rgba(255,255,255,0.05);
    }

    .usage-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

    .usage-dot.booked { background: #e94560; }
    .usage-dot.free { background: #28a745; }

    /* ========== Group Card ========== */
    .group-card {
      background: linear-gradient(135deg, #1a1a2e, #1e1e36);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 16px;
      padding: 1.5rem;
      margin-bottom: 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .group-card:hover {
      border-color: rgba(233,69,96,0.2);
    }

    .group-info { flex: 1; min-width: 200px; }

    .group-meta {
      display: flex;
      gap: 0.6rem;
      flex-wrap: wrap;
      margin-top: 0.5rem;
    }

    .group-players {
      display: flex;
      align-items: center;
      gap: 0.3rem;
      padding: 0.2rem 0.6rem;
      border-radius: 20px;
      font-size: 0.8rem;
      background: rgba(233,69,96,0.15);
      color: #e94560;
    }

    /* ========== Reviews ========== */
    .review-item {
      padding: 1rem 0;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }

    .review-item:last-child { border-bottom: none; }

    .review-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.5rem;
    }

    .review-user {
      font-weight: 500;
      color: #e0e0e0;
    }

    .review-comment {
      color: #808098;
      font-size: 0.9rem;
      line-height: 1.5;
    }

    /* ========== Booking Form Overlay ========== */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .modal {
      background: #1a1a2e;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 2rem;
      width: 90%;
      max-width: 500px;
      max-height: 90vh;
      overflow-y: auto;
    }

    .modal-title {
      font-size: 1.3rem;
      font-weight: 600;
      margin-bottom: 1.5rem;
      color: #fff;
    }

    .modal-actions {
      display: flex;
      gap: 0.8rem;
      justify-content: flex-end;
      margin-top: 1.5rem;
    }

    /* ========== Tabs ========== */
    .tabs {
      display: flex;
      gap: 0.3rem;
      margin-bottom: 1.5rem;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      padding-bottom: 0;
    }

    .tab {
      padding: 0.7rem 1.2rem;
      cursor: pointer;
      color: #808098;
      font-size: 0.9rem;
      border: none;
      background: none;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
    }

    .tab:hover { color: #e0e0e0; }
    .tab.active { color: #e94560; border-bottom-color: #e94560; }

    /* ========== Empty State ========== */
    .empty-state {
      text-align: center;
      padding: 3rem;
      color: #808098;
    }

    .empty-state p {
      margin-bottom: 1rem;
      font-size: 1.1rem;
    }

    /* ========== Responsive ========== */
    @media (max-width: 768px) {
      .header { padding: 0 1rem; }
      .main-content { padding: 1rem; }
      .card-grid { grid-template-columns: 1fr; }
      .form-container { margin: 2rem 1rem; padding: 1.5rem; }
      .form-row { grid-template-columns: 1fr; }
      .stats-grid { grid-template-columns: 1fr 1fr; }
      .group-card { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
